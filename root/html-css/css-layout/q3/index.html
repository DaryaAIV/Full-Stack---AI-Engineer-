<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>q3</title>
</head>
<body> 
    
<div class="form-wrapper">
        
        <form class="contact-form">
            <div class="form-header">
                <h1>Contact Form</h1>
                <p>Get in touch with us</p>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="first-name">First Name</label>
                    <input type="text" id="first-name" name="first-name">
                </div>
                <div class="form-group">
                    <label for="last-name">Last Name</label>
                    <input type="text" id="last-name" name="last-name">
                </div>
            </div>

            <div class="form-group full-width">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <select id="subject" name="subject">
                        <option value="">Select a topic</option>
                        <option value="support">Support</option>
                        <option value="sales">Sales</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="priority">Priority</label>
                    <select id="priority" name="priority">
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
            </div>

            <div class="form-group full-width">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Tell us how we can help..."></textarea>
            </div>

            <div class="preferences-section">
                <label class="section-label">Contact Preferences</label>
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" name="preferences" value="email"> Email Updates
                    </label>
                    <label>
                        <input type="checkbox" name="preferences" value="phone"> Phone Follow-up
                    </label>
                    <label>
                        <input type="checkbox" name="preferences" value="newsletter"> Newsletter
                    </label>
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-draft">Save Draft</button>
                <button type="submit" class="btn-send">Send Message</button>
            </div>
        </form>

    </div>

</body>
</html>
