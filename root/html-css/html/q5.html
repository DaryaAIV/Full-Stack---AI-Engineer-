<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>q5</title>
</head>
<body>
    <h1>Contact Us</h1>
    <form action="/action_page.php">
        <fieldset>
            <legend>Personal Information</legend>
            <label for="fname"> Name:</label>
            <input type="text" id="fname" name="fname" placeholder="Your name" > <br></br>
            <label for="email"> Email:</label>
            <input type="email" id="email" name="email" placeholder="Your@email.com" > <br></br>
            <label for="Phone"> Phone:</label>
            <input type="tel" id="Phone" name="Phone" placeholder="050-1234567" > <br></br>
        </fieldset>
        <fieldset>
            <legend>Message Details</legend>
            <label for="subject">Subject:</label>
            <select name="subject" id="subject">
                <option value="select subject">select subject</option>
            </select>
            <br>
            <p>Priority:</p>
            <input type="radio" id="low" name="Priority" value="Low">
            <label for="low">Low</label>
            <input type="radio" id="mid" name="Priority" value="mid">
            <label for="low">Medium</label>
            <input type="radio" id="high" name="Priority" value="high">
            <label for="high">High</label>
            <br>
            <label for="Message">Message:</label><br>
            <textarea id="Message" name="Message" >message...</textarea>
            <br>
        </fieldset>
        <fieldset>
            <legend>Preferences</legend>
            <input type="checkbox" id="newsletter" name="newsletter" value="subscribe">
            <label for="newsletter"> Subscribe to newsletter</label>
            <br></br>
            <label for="contact-method">Contact Method:</label>
            <select id="contact-method" name="contact_method">
            <option value="email" selected>Email</option>
            <option value="phone">Phone</option>
            <option value="sms">SMS</option>
            </select>
        </fieldset>
        <input type="submit" value="send Message">
        <input type="reset" value="Reset">
    </form>
</body>
</html>
