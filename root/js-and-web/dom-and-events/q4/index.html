<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Validator</title>
  <link rel="stylesheet" href="style.css">
  <script src="main.js"></script>
</head>
<body>
  <div id="form-container">

    <div class="input-group">
      <label for="input-name">Name</label>
      <input id="input-name" type="text" placeholder="Enter your name">
    </div>

    <div class="input-group">
      <label for="input-salary">Desired Salary</label>
      <input id="input-salary" type="number" placeholder="Enter Desired Salary">
    </div>

    <div class="input-group">
      <label for="input-birthday">Birthday</label>
      <input id="input-birthday" type="date">
    </div>

    <div class="input-group">
      <label for="input-phone">Phone</label>
      <input id="input-phone" type="text" placeholder="Enter phone number">
    </div>

    <div id="error"></div>
    <button id="btn-submit">Submit</button>

  </div>
</body>
</html>
